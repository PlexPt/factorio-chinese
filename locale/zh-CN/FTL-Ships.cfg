[technology-description]
ftl_Fed_Scout_tech=迅捷的侦察星舰，专为高速飞行和迅猛突击设计。
ftl_Bomber_tech=高攻击力的战斗舰船，运载能力强，但也为此牺牲了防御力。
ftl_Kestrel_tech=通用型舰船，适用于多种情况；攻击能力与防御能力均衡，支持长距离航行。
ftl_Stealth_tech=无装甲的轻型舰船，极擅长伏击和回避正面冲突。
ftl_Fed_Cruiser_tech=全副武装的主力舰船，专长于长时间战斗和维持战略优势。
ftl_Auto_Scout_tech=小型自动无人机，可用于日常低压力巡逻和预警。
ftl_Auto_Assault_tech=重型自动战舰，能与敌人正面厮杀。
ftl_Rigger_tech=支援型舰船，或为临时拼成，或为取自民用。通常担任辅助角色，也常被叛军驾驶。
ftl_Fighter_tech=敏捷的近程战斗舰船，是袭扰和缠斗的优选。
ftl_Elite_tech=高级战斗舰船，配备了强大的火力和健壮的系统。
ftl_Flagship_tech=巨型指挥舰船，配备了极为强大的火力，是所有舰队的核心所在。
