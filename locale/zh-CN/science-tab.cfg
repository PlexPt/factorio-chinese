[mod-name]
science-tab=科技编组 [Science group]

[mod-description]
science-tab=为各种科技包新增了物品编组。默认会将新地星的科技包单独区分于其他星球的，支持部分模组的科技包。

[item-group-name]
science=科技

[mod-setting-name]
science-tab-always-move-labs=默认将所有研究中心移至科技物品编组

[mod-setting-description]
science-tab-always-move-labs=存在超过10种研究中心时会强制移动，此设置启用后则会在所有情况下都进行移动。