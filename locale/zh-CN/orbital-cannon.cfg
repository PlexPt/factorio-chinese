[tips-and-tricks-item-description]
orbital-cannon=星际投物炮能与目标表面直接建立连接，具有接收和发送物品的功能，无需使用火箭或太空舱。\n\n表面上没有放置数量上限。\n投物炮的接收端可进行筛选，从而限制星球能接收的物品种类。还可通过信号网络读取收发两端当前的内容物。\n\n可用路线已在星图中以红线标出。

