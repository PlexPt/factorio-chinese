[technology-name]
fusion-construction-robots=聚变建设机器人
fusion-logistic-robots=聚变物流机器人

[mod-setting-name]
fusionpoweredrobots-cost-mode=配方消耗

[mod-setting-description]
fusionpoweredrobots-cost-mode=用于减少聚变机器人配方消耗的选项

[string-mod-setting]
fusionpoweredrobots-cost-mode-default=默认
fusionpoweredrobots-cost-mode-cheap=少
fusionpoweredrobots-cost-mode-extra-cheap=极少

[string-mod-setting-description]
fusionpoweredrobots-cost-mode-default=1个反应堆模块制造1个聚变机器人
fusionpoweredrobots-cost-mode-cheap=1个反应堆模块制造10个聚变机器人
fusionpoweredrobots-cost-mode-extra-cheap=反应堆模块原材料的一小部分制造10个聚变机器人