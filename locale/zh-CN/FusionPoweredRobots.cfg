[mod-name]
FusionPoweredRobots=聚变机器人 [Fusion Robots]

[mod-description]
FusionPoweredRobots=添加由聚变发电机驱动、能无限期飞行的机器人。太空时代的到来给它们找到了游戏后期的合适位置。

