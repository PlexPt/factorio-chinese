[tips-and-tricks-item-description]
flying-platforms=部分星球不具备固态的坚实地表，在其上进行建设的唯一方法，就是在大气层中搭建平台。而只有在上升气流足够强，强到能承载平台重量的区域内，它们才能保持稳定。
integration-hint=部分机器可直接与空中平台进行交互，可以是从中抽取能量，也可以是增加平台的功能。它们相互之间不能距离过近，间距范围由橙色边框标出。\n\n这些机器无法在空中平台之外运作。
