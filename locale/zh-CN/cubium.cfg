[item-description]
energized-microcube=不过是超立方体的一小部分，可以用来制造立方体果冻。
dormant-microcube=立方体在沉睡。真懒。
inverted-microcube=重组而成的微立方体，能够进行更多种转化。
inverted-dormant-microcube=打盹乃宇宙第一喜事。
ultradense-substrate=从超密岩浆中提取而出，再同石矿结晶而成，对制造微立方体来说很有用。
energized-shards=微立方体的碎片。
inverted-shards=反转微立方体的碎片，由微立方体相互撞击制成。
cube-jelly=通过激活微立方体产生的超凡物质。可以转化成多种有用资源。鸡肉味。 
inverted-cube-jelly=通过激活反转微立方体产生的超凡物质。可以回收成硫磺和其他资源。[font=default-bold]小心处理。[/font]
destabilized-cube-matter=不太稳定的立方体果冻，几乎快变成梦了。可回收成有用的资源。
dream=尝起来像棉花糖。溶于水可制成液态梦境。
dream-fuel=浸泡着梦境的固体燃料。怀揣希望，飞向星空。

