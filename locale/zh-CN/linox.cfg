[mod-setting-description]
linox-settings_remove-logistic-system=不再将物流系统科技设为发现星球：日凌星科技的前置，同时从开局物品中去除所有与物流相关的物品。\n\n警告：启用此设置可能会导致所给示例无法正常工作，需要手动调整。
linox-settings_remove-vanilla-circuit-collision=移除原版信号网络设备的碰撞箱。没有碰撞箱的实体不会阻碍移动。本设置在启用“吱吱穿越2”（Squeak Through 2）模组时无效。
linox-settings_enable-moshine-neodymium-recipe=启用时，可以将灼原星（Moshine）的钕加工为钕粉。
linox-settings_allow-hopper-launcher=启用时，可以在日凌星上放置载人发射井，同时允许在枢纽平台地块上放置载人发射井。
linox-settings_disable-aai-signal-transmission=若不想要AAI信号传输（AAI Signal Transmission）模组，可启用此项。会移除所有相关科技和配方。
linox-settings_disconnect-aai-signal-transmission=启用时，日凌星不会改动AAI信号传输（AAI Signal Transmission）模组的行为。
linox-settings_compatibility-distribution-request-planner=启用时，日凌星会改动该模组（Distribution Request Planner），将其置入自身游玩流程。

linox-settings_rbp-example-multiplay-language=此设置项用于本地化递归蓝图示例的说明，仅作用于多人游戏。若设置为自动，则选用首个检测到的语言。根据当前本地化缓存的状态，即便选择了其他语言，也有可能不按设置显示。
linox-settings_rbp-example-local-language=此设置项用于本地化递归蓝图示例的说明。若设置为自动，则选用首个检测到的语言。根据当前本地化缓存的状态，即便选择了其他语言，也有可能不按设置显示。

