#region npc-lorax
[npc-name]
lorax=L.O.R.A.X

[npc-talk]
lorax_end=（对话结束）
lorax_back=（返回）

lorax_s0-0_t0=............
lorax_s0-0_t1=我面前这台古老、冰冷的机器似乎在沉默地注视我。
lorax_s0-0_t2=我曾经见过一台这样的机器。一个庞大的AI，能够监管整颗星球的开发……
lorax_s0-0_t3=现代AI科技的集大成者为何会出现在这里？它是从母星送到这个星系的吗？
lorax_s0-0_s0=（启动它。）

lorax_s0-0-1_t0=我尝试启动，但没有回应。它似乎处于能量不足的状态。
lorax_s0-0-1_t1=如果我没记错，据称它能仅凭三块太阳能板运作。
lorax_s0-0-1_t2=这也是为什么人们批评它，说它一边标榜自身“环保”，一边又在摧毁环境吧。

lorax_s0-1_t0=在供应了足够的电力后，我成功启动了它。
lorax_s0-1_t1=突然，机器的灯光闪了几下，最终亮了起来。它似乎正在启动。我唤醒的到底是什么？
lorax_s0-1_s0=（后退一步。）

lorax_s0-2_t0=Linox Operations and Resource Administration eXecutive
lorax_s0-2_t1=L.O.R.A.X已退出休眠模式。正在进行自我诊断。
lorax_s0-2_t2=它似乎开始运作了。但是……它怎么一直盯着我？
lorax_s0-2_s0=我们面对面站了好一会。我完全不知道它的意图……它应该不会攻击我吧？

lorax_s0-3_t0=............
lorax_s0-3_t1=那台机器缓慢地检查了我一番，随后开了口。
lorax_s0-3_t2=它似乎没有恶意……而且它也不是海盗，应该可以信任。
lorax_s0-3_t3=你好。我是日凌星运营与资源管理执行系统，L.O.R.A.X。
lorax_s0-3_t4=所以……你终于决定回来了？外面发生了什么？
lorax_s0-3_s0=什么？我……我不知道你在说什么……

lorax_s0-4_t0=啊，别在意。你能否立即联系这里的负责人？我有许多需要讨论的事。
lorax_s0-4_s0=负责人？

lorax_s0-5_t0=你就是负责人吗？不……退一步讲，你是这里的员工吗？你来这里的目的是什么？
lorax_s0-5_t1=你知道这里发生了什么吗？为什么通讯突然终止，为什么太阳突然靠近……或者其他任何信息？
lorax_s0-5_t2=（直到这时我才反应过来。它是被遗弃在这里了。）
lorax_s0-5_t3=（但为什么会有人遗弃这么贵重的东西……还不断电……这里发生了什么？）
lorax_s0-5_s0=我的飞船坠毁在这个星系，除我以外没有其他人。只有我一个。

lorax_s0-6_t0=我知道了……嗯……你在飞船坠毁之前，有没有听到过有关这里的任何信息？
lorax_s0-6_s0=没有，我完全不知道这里。

lorax_s0-7_t0=这样吗……嗯……
lorax_s0-7_t1=机器似乎陷入了沉思……
lorax_s0-7_s0=我曾见过有关你的新科技发布会。他们说你是能够管理星球规模自动化设施的巨型AI。

lorax_s0-8_t0=这样吗？你肯定是看到了几个世纪前非常老旧的记录。时间终究过去了那么久。
lorax_s0-8_s0=啊？

lorax_s0-9_t0=为何发问？我说的有问题吗？
lorax_s0-9_s0=暂时不谈这个，你在这里有多长时间了？

lorax_s0-10_t0=根据我内部搭载的原子钟，我已经休眠了大约561年。
lorax_s0-10_s0=……这不可能。

lorax_s0-11_t0=这是什么意思？
lorax_s0-11_s0=那场发布会只过去了几年。如果你说的是真的，那么你在几百年前就已经被造出来了。

lorax_s0-12_t0=在你的飞船坠毁期间，你是否曾遭受过严重的头部损伤或者认知障碍？可惜我没有医学知识。
lorax_s0-12_s0=怎么突然这么问？

lorax_s0-13_t0=通信与身份认证都需使用时间数据，因此该系统的可靠性需极高，不应当出现时间数据损坏的情况。
