[recipe-description]
linox-recipe_advanced-acid-neutralisation=将硫酸转化为高温蒸汽。在日凌星，此过程可通过特殊方法提高效率。
linox-recipe_rare-earth-refining=以化工工艺处理大量石矿，从中提取出稀土，产量高达2%。这正是日凌星先进科技的体现。
linox-recipe_samarium-centrifugation=使用离心工艺从稀土矿中分离出钐。

linox-recipe_rapid-distillation=在超高温岩浆中焙烧原油，可产出珍贵的煤炭。这种极端的处理工艺即便效率不高，也反映出日凌星的科技智慧。
linox-recipe_lava-based-rocket-fuel=向足够热的岩浆引入少量能量，即可产生超高温气体，适合用作火箭燃料。
linox-recipe_froth-flotation-processing=泡沫浮选可用于分离亲水和疏水材料。

linox-moshine-recipe_neodymium-crushing=破碎在灼原星挖掘得到的钕，即可轻松获取纯净的钕粉。
