[entity-description]
linox-npc_lorax=管辖整个日凌星的巨型人工智能。
linox-npc_network-terminal=可访问日凌星行星网络的终端。
linox-npc_power-converter=巨大的电力控制模块，管理着日凌星大小设施的电力网络。

linox-building_advanced-rocket-silo=高性能火箭发射井，能在极端严酷的环境下运作。它的运作速度是常规火箭发射井的四倍，且其本身能被发射到太空平台。
linox-building_cargo-elevator=设计用于在日凌星设施枢纽中运输物品的传送带。
linox-building_cargo-landing-pad=设计用于研究的物流接驳站，不适合大批量物流。在接驳站附近按下 __CONTROL__toggle-driving__ 可前往地下设施。
linox-building_planetary-power-network=连接着整个日凌星的电力网络。
linox-building_core-roboport=小巧的机器人指令平台，工作范围极为有限，但充电速度非常快。
linox-building_deep-oil-pumpjack=能从地下深处抽出残存至今的原油。
linox-building_fluid-elevator=用于在日凌星设施枢纽中运输流体的管道。
linox-building_fluid-elevator-input=用于在日凌星设施枢纽中运输流体的泵。
linox-building_fluid-elevator-output=用于在日凌星设施枢纽中运输流体的泵。
linox-building_mantle-extractor=用硕大的采矿机钻穿星球的地壳，从地幔中提取岩浆。借此可以在任何地方产出岩浆，但同时需要消耗巨量能量，且会产生大量污染。
linox-building_sulfuric-acid-pumpjack=能从地下深处抽出残存至今的硫酸。
linox-building_turbo-pump=高性能管道泵，能耗巨大，但产量也巨大。

linox-building_linox-supercomputer=能够承受日凌星严酷环境的特殊超级计算机。L.O.R.A.X似乎背地里对它很感兴趣。
linox-building_sintering-machine=能加热粉状材料，再用高压将其压成实心块状材料的机器。
linox-npc_power-converter-circuit-input=在此输入信号，以控制功率转换器。
linox-npc_power-converter-circuit-output=在此读取信号，以用于逻辑控制。
linox-hidden_reactive-power=功率转换器无法高效管理电力时，即会产生无功功率。

linox-building_chemical-tank=化学反应釜能使用大量流体进行复杂的化学处理。
linox-building_outlet=排液口可用于向海洋排放废水。水里的鱼会帮着吃掉，也许就能连带着清理干净了……应该是吧。
linox-building_chemical-filter=化学过滤机能通过物理与化学工艺从溶液中选择性提取出所需物质。就像是口味刁的老饕在专门拣滋味足的地方吃。
linox-building_huge-heat-exchanger=大到吓人的换热器。最多能处理250 MW的热能。
linox-building_neodymium-permanent-magnet-generator=使用钕永磁体的发电机。多亏有钕来产生强大的磁力，高效率高容量的发电机也能压缩到这种尺寸。

linox-building_erbium-beacon=据称，使用铒改进效果分享塔可让其容纳两倍数量的插件。感受到稀土元素磅礴的力量了吗？
linox_samarium-construction-robot=使用钐增强的建设机器人能在300%的超负荷下运作，免疫火焰，耐久度也得到了强化。
linox_samarium-logistic-robot=使用钐增强的物流机器人能在300%的超负荷下运作，免疫火焰，耐久度也得到了强化。
linox-building_neodymium-bulk-inserter=经由钕增强后，这件集装机械臂的扭矩得到了大幅提升，能以极高的速度运作。
linox-building_neodymium-stack-inserter=经由钕增强后，这件堆叠机械臂的扭矩得到了大幅提升，能以极高的速度运作。

linox-special_circuit-pole=可在此连接电线，以连通地表和地下的电力网络。
linox-special_facility-elevator=在电梯附近按下 __CONTROL__toggle-driving__ 以搭乘。
linox-special_emergency-escape-shuttle=[color=yellow]拆解后无法恢复！[/color]\n\n倘若日凌星实在变成了沉重的负担，何不放下一切，到别处去稍作休息呢？

linox-special_internel-pipeline=这条管线能接收地下的深层钻探设施送来的资源。由于深层钻探设施原本并不会与研究设施直接相连，这些管线的位置也随之无法随意选择。不过，L.O.R.A.X已经改进了管网系统，因此你可以选择它输出何种资源。
