[item-description]
rare-earth-powder=混有多种矿物和岩石的稀土粉。
samarium-powder=从稀土粉中分离得到的纯净钐粉。这种粉可以烧结得到钐。
samarium=钐可用于制造能承受极端高温的永磁体。
tungsten-gear-wheel=由钨制成的材料极为耐用，且工作温度上限非常高。
tungsten-stick=由钨制成的材料极为耐用，且工作温度上限非常高。
dysprosium-powder=镝能够增强永磁体的性能，且表现出了磁致伸缩行为——材料长度会根据磁场环境改变而变。据称此元素极难提取。
dysprosium-exoskeleton-equipment=此模块使用钨钢强化，又以合成镝肌纤维驱动，能在减少耗能的同时增强性能。
neodymium-oxide=高价值的氧化钕，是历经无数次精炼才得到的产品。高温灼烧可去除其中的氧原子，得到纯净的钕。
neodymium-powder=终于，造出了纯净的钕。将这种粉与铁和镝混合，再加以烧结即可制成钕磁铁。确实很麻烦。哦对了——小心别把汗滴上去了。
neodymium-permanent-magnet=由钕制成的永磁体。它能产生极强的磁场，被用于许多高性能设备。实际上，钕已经是世界上开采得最多的稀土元素了——几乎完全是因为这种永磁体。
erbium-oxide=费尽千辛万苦得到的高价值氧化铒。只剩最后一步高温焙烧，就能得到纯净的铒了。
erbium-powder=纯净的铒粉。铒主要用作光放大掺杂剂，掺入光纤后可大幅提升信号质量。务必小心，别让它飞到眼睛里！

linox-item_lava-data-card=他们说，日凌星的岩浆里溶解有几乎所有种类的物质。就连岩浆都能当我们的老师。
linox-item_rare-earth-data-card=稀土元素可用作化学催化剂，也可用于强化其他材料的性能。世界上怎么还有这么多要学的啊？
linox-item_samarium-data-card=他们说，理解钐之后，就能对高温环境下的电磁场取得更深的见解。我们到底还要学多少东西？
linox-item_dysprosium-data-card=镝常被用作钕永磁体的添加剂，也被用于制造半导体和Terfenol等特种合金。传言称巫师喜欢把它加到药水里。
linox-item_neodymium-data-card=钕可用于制造迄今最强的永磁体，许多高端电子设备里都会用到它。实际上，你阅读这段文本所用电脑需要的电力，就很有可能是由钕磁铁协助产出的。

linox-item_erbium-data-card=铒主要用作光放大添加剂。有说法称，添加它能大幅增强光纤的信号质量。在连接多人游戏服务端的时候，你可能就在使用含铒的光纤！

linox-tool_badchest-area-viewer=显示蓝图自动部署箱的工作范围。
