linox=日凌星是一个极其危险的世界，比祝融星还要靠近太阳。日冕抛射和耀斑爆发直达星球表面，摧毁途经的一切事物。太阳强大的引力则无情地搓揉扭曲着这颗星球，制造出极端、恶劣的环境。这种星球上真的还有值得探索的东西吗？

