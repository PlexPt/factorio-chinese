neodymium-solution=完全饱和的钕溶液——有着极大的潜力，如同日出般朝气蓬勃。
waste-water=从工厂机器中排出的无用废水。很难闻。
low-concentration-erbium-solution=低浓度的含铒溶液。几乎检测不到其中的铒。
high-concentration-erbium-solution=高浓度的含铒溶液。铒含量已大幅提升。
