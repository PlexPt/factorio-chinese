linox-tile_linox-hazard-terminal-platform=支撑着日凌星设施枢纽的平台。这种平台不够坚固，无法承载建筑，只有少数几种结构才能放置在上面。
linox-tile_linox-facility-platform=支撑着日凌星地下设施的平台。这种平台不够坚固，无法承载大多数建筑，只有特定种类的建筑才能放置在上面。
linox-tile_linox-hazard-facility-platform=支撑着日凌星地下设施的平台。这种平台不够坚固，无法承载大多数建筑，只有特定种类的建筑才能放置在上面。
