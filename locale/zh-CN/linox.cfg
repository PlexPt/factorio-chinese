[technology-description]
linox-technology_planet-discovery-linox=在研究太阳的时候，你发现有一颗小型星球正以极近的轨道绕太阳公转。这远非平常事——使用当下的物理知识推导，行星如果离恒星这么近，要么会被引力拉入恒星，要么会被潮汐力撕得粉碎，以至于完全没有可能存在。它到底是什么？更重要的是……你真的打算去那个地狱走一遭吗？
linox-technology_exploring-linox-landing-site=[color=yellow][font=default-bold]本科技需要有太空平台停靠于日凌星才能研究。[/font][/color]\n\n和预测一样，这颗星球没有固态地表。不过，如果让停靠在它上方的太空平台去考察，也许就能找到些什么……
linox-technology-trigger-description_lorax-talking=通过与L.O.R.A.X对话解锁。

linox-technology-trigger-description_lorax-purchase=向L.O.R.A.X购买此科技。

linox-technology_facility-upgrade=要逃离日凌星，这个狭小的设施必须工业化。它小到连个停车场都放不进去。
linox-technology_planetary-power-network=这个设施已经配备了大型的星球电力网络。要是能利用起来，就没有重建电网的必要了。换句话说——不会再因为电线拧成麻花而受苦了。
linox-technology_planetary-power-network-capacity=增加星球电力网络的容量。每级都会追加5 GJ的容量。
linox-technology_facility-factoryizing=移除设施内所有无关的机器，腾出空间搭建工厂。但就算这样，地方好像也不够。
linox-technology_expanding-factory=清理更多杂物，腾出更多空间。小心别把家庭合照弄丢了。
linox-technology_cargo-elevator=开发一套交通和传输系统，将日凌星表面和地下设施连接起来。
linox-technology_rocket-silo-foundation=日凌星的表面是一片炽热的岩浆海，无法铺设传统的工程基座。而且，设施入口无法支撑火箭发射井的重量，没有能用来建设的空间。开发出一种特殊的漂浮平台，足够承载火箭发射井的重量，至少就能留出地方放置发射井了。

linox-technology_laboratory-database=日凌星研究实验室的数据库里也许有能帮到我们的科技……或者也有可能里面塞满了不雅资料。
linox-technology_linox-petrochemicals=日凌星沐浴在太阳莫大的能量之中，其极端的环境可用于实现独特的石化工艺。
linox-technology_recursive-blueprint=日凌星的研究员甚至都自动化了蓝图，就为了让有限的空间物尽其用。借助这项科技，即可自动化蓝图以搭建微型工厂。任谁也想不到，工厂现在只需要一个巴掌大的地方！
linox-technology_tungsten-processing=精加工钨制成的零件表现出了极强的耐冷耐热性和耐磨损性。把它加到叉子里，这样叉食物的时候就不会出现变形了。
linox-technology_turbo-pump=在清理垃圾的时候，你找到了一份新管道泵的蓝图。据笔记，这份蓝图是整台行星级计算机使用全部算力在仅一分钟内完成的。它的性能超过了现有的管道泵。为什么他们要在管道泵上用行星级计算机，又是什么耗了它整整一分钟，至今仍是个谜——但反正能用，那就用嘛。
linox-technology_core-roboport=研究员已经疲于看见机器人只是为了充电，就把指令平台围得水泄不通。于是他们拆解了机器人指令平台，并重新设计了一份。这种机器人指令平台的工作范围很有限，但相应地，它的充电速度非常快，且能同时给大量机器人充电。
linox-technology_enhanced-space-engineering=要在日凌星上让火箭发射井运作，需要对太阳和高端高性能材料有一定的理解。
linox-technology_advanced-rocket-silo=高级火箭发射井的运作速度是普通发射井的四倍，且其本身能被发射到太空平台。传统发射井的速度实在太慢，效率实在太低。用高性能的钐发电机跳过不必要的步骤，可以将发射时间缩短最多75%。除此之外，优化材料还减轻了它们的重量，足够把它们发射到太空里去——这就很不错了！
linox-technology_safety-of-entering-orbit=每级追加5%的货物正常着陆概率。若想在太阳的怒火里保护好你珍贵的货物，这项研究必不可少。
linox-technology_sintering-machine=在高温环境下挤压精细的粉状材料，即可轻松制造出任意形状的产品，无需复杂工序。它还能排除加工的损耗，将用量压缩到最小，是精打细算之人的不二之选。

linox-technology_planetary-mining-technology=日凌星曾是为实验室产出资源的大型采矿星球。里面也许有不少能学习的知识。
linox-technology_mantle-extraction=基础的星球开采科技。往地下挖掘数万米，钻入地幔提取岩浆。虽然能让岩浆随处可用，但这一过程会消耗大量的能量，并产生大量的污染。\n\n务必小心：这台机器开始运作之时，环保团体的人就会发起火，喷着唾沫星子跑到你眼前。不过嘛，方便才是最重要的，对不对？
linox-technology_stone-extraction=可以直接从岩浆中产出石矿。要是能提取到铁和铜，那么石头为什么不行？
linox-technology_tungsten-extraction=可以直接从岩浆中产出钨。要是能提取到铁和铜，那么钨为什么不行？
linox-technology_casting-stone-brick=直接在铸造厂中生产石砖。电炉大概只会在玄冥星用了。
linox-technology_rare-earth-refining=精炼岩浆中溶解有的痕量稀土元素。此工艺会产生大量废料和环境污染——但在无人居住的星球上，这完全不成问题。
linox-technology_samarium-centrifugation=从稀土矿中离心得到钐。钐可让永磁体在极高的温度下维持磁性，用钐制造的机器能在严酷环境下可靠地运作。
linox-technology_ultra-deep-drilling=即便是在地表只剩岩浆海的星球上，也依然残留有自然资源。这间实验室里的钻探设施能从地下极深处抽取出资源。人类真是不屈不挠啊。

linox-technology_linox-supercomputer=日凌星是最不适合计算机运行的地方之一。但该做的事总归要做。借助钨和L.O.R.A.X的错误修正辅助，即使是日凌星也能使用超级计算机了。
linox-technology_samarium-data-card=实际上，含钐磁体并不是运作温度最高的，但我听说它的磁力要强上许多，也因此更加有用。世界上有太多可以好奇的东西了，不能全部刨根问底实在是遗憾！
linox-technology_lorax-support=你搭建了一套接口系统，这样L.O.R.A.X就能帮到你了。现在，L.O.R.A.X还只会协调数据生产，但数据卡的产能已经提升了足足25%。毕竟，计算机就是要拿来做计算的。
linox-technology_power-converter=修复星球电力网络中的超级功率转换器，即能解锁一个高容量能量存储系统，容量足有5 GJ。不过不知为何，L.O.R.A.X似乎……对这个系统明显感到不满。
linox-technology_tungsten-sintering-processing=使用烧结工艺，可以将钨矿迅速加工成可用的钨制产品。此方法的速度和效率都远高于传统的精炼——更不必说，工序里少了一整步，能大大简化生产。
linox-technology_froth-flotation-processing=泡沫浮选工艺利用了疏水颗粒的疏水性。向浆液引入泡沫时，疏水颗粒会被吸附在泡沫上，浮到表面，以便分离。\n\n东亚的一个小国家有个梗，“水知道答案”。总让我想起水刑，但我能确定这只是个巧合。
linox-technology_dysprosium-extraction=经过泡沫浮选和许多其他步骤，可以提取得到高价值的高纯镝。这种粉末可以用于生产数据卡——也可以拿到市场里去卖，每千克的价格会在$200到超过$1000之间来回浮动。
linox-technology_dysprosium-data-card=镝称得上是永磁体的“魔法粉末”，但2021年全球镝产量仅有约3100吨。我们真的要把这么稀有的金属用到制造数据卡里去吗？
linox-technology_dysprosium-exoskeleton-equipment=看看之前的外骨骼模块——细细的腿很容易断，能耗高达200 kW，移动速度还比不上垂死的蜗牛。很不理想。我们往上面稍稍撒点魔法镝粉，于是啪的一下——性能瞬间提升，真的就像魔法一样！而且这一切只要$39,999！

linox-technology_build-data-catalog=据L.O.R.A.X所说，我们的研究成果已经开始逐渐汇合，是时候进行系统性整理了。组织管理收集得到的数据可提升高级数据卡的产能，并解锁高层次的研究。
linox-technology_chemical-particle-filtering=使用化学方法选择性分离出所需粒子。此工艺需要相当程度的化学知识，但最有可能的情况是，L.O.R.A.X和机器会帮我们处理妥当。学习新知识总归是难的。
linox-technology_waste-water-treatment=其实，“废水处理”只是给直接排放安了个好听的名号。和地幔提取机一样，这台机器同样是环保团体的眼中钉肉中刺，但他们大概率来不了日凌星就是。
linox-technology_neodymium-extraction=解锁钕提取工艺。提取稀土非常困难，过程中需要大量的资源和水，还会产出大量的废料。但为了钕就一切都值了。你既然已经在日凌星上了，为何不待到结尾再走呢？
linox-technology_neodymium-data-card=钕用于生产世界上最强大的永磁体，如今你身旁稍稍昂贵一些的电子设备里都有它。实际上，你阅读这段文本所用电脑需要的电力，就很有可能是由钕磁铁协助产出的。
linox-technology_neodymium-permanent-magnet=将钕粉和镝与铁混合，再加以烧结，即可制成举世闻名的钕永磁体。其中还应该加入硼，但实现起来和玩起来都太复杂，所以我们没有加。关键之处在于，这种磁铁非常有用。
linox-technology_neodymium-permanent-magnet-generator=最后，我们向你介绍这件产品。使用钕永磁体，即可在小空间内处理大量能量。这台发电机的发电量是标准汽轮机的整整43倍！除此之外，本科技还附赠一种巨型换热器。

linox-technology_erbium-extraction=解锁铒提取工艺。它看上去和钕提取工艺很像，但这绝非偷懒而为之。实际上，所有稀土元素的生产流程都是这样：加入添加剂，再浓缩几百次。难怪会有这么多污染了。
linox-technology_erbium-data-card=铒主要用作光放大添加剂。有说法称，添加它能大幅增强光纤的信号质量。在连接多人游戏服务端的时候，你可能就在使用含铒的光纤！
linox-technology_erbium-beacon=铒的确能减少光纤的信号损失，但说实话我不知道这和《异星工厂》的插件效果分享塔有什么联系。无论如何，铒能提高插件效果分享塔的性能，允许插入4个插件。可以直接从原有的分享塔升级为这种！

linox-technology_rare-earth-powder-productivity=增加稀土产量，同时减少污染。
linox-technology_get-cargo-landing-pad=从L.O.R.A.X处取得主物流接驳站的控制权限。允许你从太空平台上接收货物。
linox-technology_basic-material-sintering-processing=烧结加工铁矿和铜矿，产出相应产品。依靠蛮力为材料塑形是从石器时代就有的老传统。
linox-technology_sintering-machine-productivity=增加烧结机的产能。产出的材料似乎比你放进去的要多……这能叫“创造”吗？

linox-technology_ground-platform-expansion=现在想来，地下设施都已经坐落在岩浆海里面了，那么为什么地表平台就不能扩展呢？意识到这一点后，我立刻跑到L.O.R.A.X旁边问它为什么扩展不了。我得到的答复是：“因为你从来没有问过。”又一次，细节决定成败。不要憋着话不说。
linox-technology_samarium-robotics=利用钐的高温性质，机器人的耐久度得到了提升，同时获得了免疫火焰的能力，且能在300%超负荷状态下短暂工作。有句话说得好，“吃得快，拉得也快。”
linox-technology_dysprosium-electric-motor-robot=向机器人的电动机加入少量镝，最多可将能量效率提高25%。镝确实就像是种魔法粉末，但别吃它，它是重金属。
linox-technology_neodymium-permanent-magnet-inserter=利用钕永磁体电动机的强大扭矩，可以显著提高机械臂的性能。它们的旋转速度已经快到肉眼几乎看不清楚了。盯着看甚至可能会头晕——请勿在家尝试。

linox-moshine-technology_neodymium-crushing=灼原星上可以轻松开采得到高纯度的天然钕。简单将这种天然钕破碎即可产出钕粉。如此高纯度的稀土就在地表放着——灼原星真乃磁学家的天堂！
linox-technology_planetary-power-converter-capacity=增加功率转换器的容量。每级追加2.5 GJ。\n\n即便是在废弃数百年之后，它依然在为人类而工作。这点程度的投资我们都出不起吗？请尊重机器人的权利。
linox-technology_outer-corridor-open=开放环绕设施的外侧走廊。这条走廊起初完全被岩浆和岩石堵塞，不过L.O.R.A.X已在我们忙于其他任务时将它们清理完毕了。回想起来，研究员的日志里确实从来没有抱怨过厕所。

linox-technology_adding-pipeline=追加一条深层钻探设施管线。新管线会安装在内侧走廊墙壁上的随机位置。\n\n由于深层钻探设施原本并不会与研究设施直接相连，这些管线的位置也随之无法随意选择。不过，L.O.R.A.X已经改进了管网系统，因此你可以选择它输出何种资源。是不是很不错？
linox-technology_pipeline-productivity=增加深层钻探设施的产能。\n\n在现实里，玩家其实和这项研究之间没有太大联系，因为你无法直接与深层钻探设施交互。所有对它做出的改进都完全由L.O.R.A.X处理。随着研究等级的增加，L.O.R.A.X的负载也显著增加了。回想起来，我一直都在好奇为什么最近管线里冒出了些像是毒气的东西……L.O.R.A.X，别跟我说你是——

linox-technology_chemical-tank-productivity=增加化学反应釜的基础产能。《圣经》有言，上帝曾用一场大洪水涤清了世界。你难道没有好奇过那些水都是哪里来的吗？
linox-technology_chemical-filter-productivity=增加化学过滤机的基础产能。煲汤用的料越足，汤就越能填饱肚子，这算是常识。锅底记得多刮刮。
linox-technology_distribution-request-planner=增加能简化物流请求箱配置过程的工具。依次手动设置请求太过原始和累人。用这件自动化工具，将你自己从苦劳中解放出来吧！

