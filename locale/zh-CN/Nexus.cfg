[space-location-description]
nexus=一个地表早已被摧毁的行星。曾有一种远超人类的物种在此居住，至少这颗行星富含钷，这是宇宙中最稀有的元素之一。
oort-cloud=这个星系中的奥尔特云充满了危险的小行星。说实话，数量异常庞大。我需要一艘装备精良的飞船才能穿越。
sol=人类的家园星系太阳系。我迫不及待想回家，向我们的公司讲述我的冒险经历。但首先我必须建造一个新的曲速驱动。

[item-group-name]
nexus=枢纽星

[fuel-category-name]
photon-cube-energy=光子方块能量

[nexus-research-discription]
planet-nexus-scanning=我发现了一颗富含稀有元素的行星，这让我离回家的目标更近了一步。我只需要为之开发一套新套装，因为这颗行星的条件非常恶劣。
planet-nexus-scanning-Krastorio2-space-out=既然我的救援对联邦来说显然不重要，我必须自己寻找回家的路。我发现了一颗富含稀有元素的行星，这让我离回家的目标更近了一步。我只需要为之开发一套新套装，因为这颗行星的条件非常恶劣。
element882=现在我知道这颗行星质量如此之高的原因了。曾经居住在这里的物种和现代人类一样先进，他们用欧米茄合金建造了各种设备。行星表面及其城市完全被摧毁了，但我可以从行星地壳中提取元素钷 882。我只需要大量的电力来完成这项工作。我应该很快就能制造出高级机器，包括我自己的曲速驱动。
atomacer=有了这些机器，我就可以将物质分解成其组成部分并将其分离。为了安全起见，我应该把“光子富集室”建得远一些。这种高能液体在生产过程中会短暂处于高度不稳定状态。我不想让机器爆炸。
matter-stabilization=糟了，它快要爆炸了。我应该保持距离。不幸的是，在光子液的生产过程中有时会形成临界光子方块。我必须稳定它们，否则它们会以小型原子弹的威力爆炸。我希望以后能解决这个问题。
omega-components=我终于可以生产欧米茄合金了。这将需要大量的材料，而且我将需要更多的光子液，最重要的是，需要更多的电力。我应该利用我的新建筑材料及其特性来开发一种更好、更高效的发电方法。
fusion-power-mk2=我终于完成了一种新的、更高效的聚变反应堆。现在我应该能够满足我不断增长的电力消耗了。
photon-stream-thruster=借助这种新引擎，我应该能够更好地在太空中旅行。它产生四倍于其前身的推力，并且工作效率更高，因为它使用光子液和氧化剂作为燃料。
photon-electronics=借助欧米茄一代和更好的组件，我应该很快就能生产反物质和奇异物质，我需要它们作为曲速驱动的燃料。只差一小步了。
antimatter-produktion=我终于成功了。一台用于生产反物质和奇异物质的机器。唯一的缺点是它需要大量的物质和能量。但现在我应该能够应对了。我应该将机器的发电与我的主电网断开连接，以防止电网过载。我的旧飞船在 891.2 吨时需要 2501 单位的燃料（反物质和奇异物质）。
warp-drive-engine=现在，除了我必须穿越极其密集的奥尔特云之外，没有什么能阻碍我前往星辰和回家。我应该好好装备我的飞船，以穿越这个密集的小行星云。我还应该注意不要在奥尔特云内点燃曲速驱动。如果我在行星系统内部这样做，由于空间的曲率，可能会导致灾难性的错误。而且我必须记住，首先要将两种燃料连接到曲速驱动，并且只有当反物质和奇异物质进入其内部储罐时才点燃它。否则，我将面临它爆炸或其他可怕事情发生在我被困在其中的时空中的风险，没有任何保护。已经有报告称故障达到了第四维度。