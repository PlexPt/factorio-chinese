[tips-and-tricks-item-name]
secretas=[planet=secretas] 御宿星

[tips-and-tricks-item-description]
secretas=在[entity=outer-rim-magnetic-collector]附近击毁御宿星上残留的防御性单位，即可收集得到[item=outer-rim-solid-state-battery]和[item=outer-rim-advanced-processing-unit]。收集物储存在[entity=outer-rim-magnetic-collector]之中。\n\n敌人会被污染吸引，可以在它们附近建造工厂，也可使用武器攻击它们。

