[mod-name]
ArtilleryCombinator=重炮运算器 [Artillery Combinator]

[mod-description]
ArtilleryCombinator=能让重炮瞄准地图上一点的运算器，可用信号网络控制。X和Y为相对位置，虚拟信号A > 0时则为绝对位置。发送“重炮袭击瞄准器”信号以发射重炮。由Phoenix-D更新至2.0。基本支持内容可能仍存在漏洞。

[controls]
artillerycombinator-shame-and-regret=羞愧与悔恨
[controls-description]
artillerycombinator-shame-and-regret=你真正需要的时候就知道这是干什么的了。为用到这个的人感到可怜。

