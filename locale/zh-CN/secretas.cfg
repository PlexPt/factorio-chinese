[mod-setting-description]
modify-loaders-for-belt-stack-size-limit=若为true，模组会修改所有装卸机原型，增加它们的传送带叠放上限，以允许其处理更大的传送带叠放数。
ignore-dea-dia-compatibility=若为true，即便安装了迪亚星系（dea-dia），本模组依然会表现为未安装时的状态。由于兼容仍在开发中，当前此项为true。
restrict-steam-recycler-crafting-to-frozeta=若为true，则蒸汽回收机仅可在寂蛰星处制造。
condense-level-4-modules-into-one-technology=若为true，则可用同一项科技解锁所有4级插件。若为false，每种4级插件都会有其独立的科技。
check-this-if-frozeta-start=在寂蛰星开局时必须将此项设为true，否则模组将无法正常运作。
automatically-populate-science-pack-productivity-research=若为true，模组会尝试将所有科技包纳入科技包增产计划（science-pack-productivity）的研究消耗。如有模组冲突可禁用。

