[technology-description]
fusion-missile=磁性合金可用于储存既强大又扩散的等离子体。这些火箭具有高伤害和高半径。 
ske_fusion_thruster=我们的推进器可进一步升级与精进，现在能够利用等离子体能量源，将平台推进得更快更远，能源效率卓越，突破传统动力极限。
ske_fusion-thruster=我们的推进器可进一步升级与精进，现在能够利用等离子体能量源，将平台推进得更快更远，能源效率卓越，突破传统动力极限。
s2_transport-belt-capacity-vesta=传送带容量（灶神星）
s2_worker-robots-storage-vesta=机器人货物容量（灶神星）
transport-belt-capacity-vesta=传送带容量（灶神星）
worker-robots-storage-vesta=机器人货物容量（灶神星）

s1_dueterium=更高级的聚变燃料生产可以通过利用灶神星大气中的元素来实现。通过分解各种化合物，它们可以被重塑和重铸成纯氢同位素。氘与氚是生产铱所必需的。
s1_iridium=铱板具有足够的耐用性和热稳定性，可以为藻类提供温暖的环境，而不会被高温杀死。
s1_algea_discovery=灶神星大气中的各种气体也是大量微生物物种的家园。这些微粒可以从气体中收获，通过精心培养，可以成为我们获取资源的唯一方法，包括铁和铜。
s1_algea_extracting=灶神星的藻类非常强大且进化。如果喂食某些气体和热量，它将改变其成分并生长类似句芒星细菌微粒的金属化合物。这些金属化合物可以在燃烧过程中进一步处理以产生各种金属资源。
s1_gas_manipulation_science_pack=研究各种气体相关技术增强。
s2_fusion_enhancements=进一步增强我们的聚变突破。

planet-discovery-vesta=探索气态巨行星，灶神星，这座星球大部分为气态，但似乎有岩石结构被困在其气体场中。气体区域是多种简单气体混合物，包括氢、氮、二氧化碳和氦。似乎在气体场中存在各种杂质，可以过滤掉。

s1_algea_filtering=过滤器允许我们轻松捕获在淡水供应中培养的藻类浓度。然而，并非所有过滤器都有效，它们必须专门开发以分离藻类而不会损坏其结构。
s1_algea_filtering_2=过滤器可以清洗，这会给我们一个过滤器以及一些额外的藻类。

s1_algea_oversaturation=过量喂养灶神星原生藻类使其变得非常营养。它可以作为营养素的地方替代品，不会腐烂！

s1_algea_culturing=灶神星大气中的各种气体也是大量微生物物种的家园。这些微粒可以从气体中收获，通过精心培养，可以成为我们获取资源的唯一方法，包括铁和铜。

s1_algea_treatment=灶神星的藻类非常强大且进化。如果喂食某些气体和热量，它将改变其成分并生长类似句芒星细菌微粒的金属化合物。这些金属化合物可以在燃烧过程中进一步处理以产生各种金属资源。

s1_electrolysis=有时热量不是解决问题的答案，但电是。通过向不同形式的物质引入大量伏特，我们可以改变其成分。一些藻类可能对被引入电产生意想不到的反应。

s1_supermagnet=利用高电流在环形磁体中产生强大的磁场。这些场可以用于刺激和激发各种资源以激活它们。一些藻类可能对这些能量产生不同的反应。

s1_t2d2=更高级的聚变燃料可以通过利用灶神星大气中的元素来实现。通过分解各种化合物，它们可以被重塑和重铸成纯度，这可以进一步增强我们的聚变突破。

s2_fusion_robots=现在有了更高级的能量生成，升级我们的物流和机器人能力是合乎逻辑的。这些机器人将由氘氚燃料聚变电力驱动，永远不会需要充电，使它们能够持续工作。

s2_plasma_pipes=从聚变反应中产生的等离子体通常无法移动或操纵，直到现在。通过在加强的管道框架周围制作铜线圈，并在内部用强、耐热型镥合金衬里，我们可以自由地移动等离子体。然而，由于我们操纵的元素的性质，管道不能放置在地形下。

s2_plateworkings=氢和氧是炼制我们的矿石时很好的催化剂。如果我们使用两种气体中的任何一种进行燃烧，我们可以增加铜和铁等基础金属的产量。氢的产量略慢，而氧则非常快。

s2_intermediate_productivity=增加最常见物品的产量。

s1_algea_rare_metals=稀有金属是生产处理单元和其他物品所必需的，但灶神星没有稀有金属来源。我们可以培养一种藻类，它将钙化这些金属。 

ske_heating_conductor=有时热量是唯一能改变分子结构的催化剂。加热导体可以接受多种液体或物品，并暴露于强热中以形成新物质。

hydrogen-sulfide=硫化氢是生产氘气所必需的资源。如果我们可以在灶神星上生产它，那么直接在其他星球上制造聚变机器人将不再是一个梦想，而是一个现实。

ske_carbon_dioxide_offworld=二氧化碳的生产应该是一个简单的任务，将碳源加热到极端温度并结合氧源，例如水。
carbon-dioxide=二氧化碳的生产应该是一个简单的任务，将碳源加热到极端温度并结合氧源，例如水。

ske_working_with_gases=气体是灶神星上资源的主要组成部分。我们可以通过使用离岸泵从云海中收获气体。
ske_gas_giant_platform=扩展云海并不像预期的那么困难。云层足够密集，可以支持最重的地基工程，使我们能够轻松扩展。

