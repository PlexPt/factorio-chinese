[mod-name]
skewer_planet_vesta=○🌐灶神星 [Vesta]

[mod-description]
skewer_planet_vesta=星系远端的气态巨行星。在它浓密无比的大气中似乎有些小型的岩石块。灶神星是气体的世界，一切都和气体息息相关。如同时启用了破碎星球模组，本模组会有所改动，尤其是气体的制造方法；同时破碎星球的若干建筑会移动至此。到目前为止，本模组还未和Krastorio 2 Spaced Out及BZ Ores有配方兼容，但由于冲突会被一直列出；和两者中任一一起游玩会导致灶神星的难度上升。星球的内容会根据玩家反馈和意见进行平衡和改动。

[mod-setting-name]
ske_realistic_gases=真实气体色彩
ske_vesta_gases=灶神星独立气体
ske_disable_metal_and_stars_bots=禁用金属与繁星机器人
ske_vesta_original_generation=灶神星原生岩岛
ske_vesta_legacy_recipes=复杂模式
ske_easy_fluids=气体消耗降低
ske_fusion_thruster=聚变推进器只能在灶神星专属研究中获得
ske_fusion_thruster_og=聚变推进器原始数值

[mod-setting-description]
ske_fusion_thruster_og=将聚变推进器的各项数值回退到2.0.31的削弱之前，能产生极其巨大的推力。太空平台能在转眼之间抵达其他星球，配合聚变导弹还能在极大程度上保证航程安全。

ske_realistic_gases=用更被广泛接受的外观取代多彩气体。

ske_vesta_gases=关闭时，灶神星将与其他模组共用气体。如本模组与其他模组在流体兼容性上存在冲突，可开启此选项，灶神星相关气体将独立处理，可能出现重复流体。

ske_disable_metal_and_stars_bots=默认关闭。如同时游玩“金属与繁星”且不希望获得该模组的反物质机器人，请开启本项。

ske_vesta_original_generation=启用时，灶神星表现为原生地貌——气态巨行星的表面点缀有若干被其捕获的大型岩石平台，适合休闲游玩。关闭后，灶神星为极度真实的气体巨星，仅在出生点区域有气态巨行星平台，没有其他陆块，适合自虐挑战。

ske_vesta_legacy_recipes=恢复1.0版本的配方与科技链，该版本的灶神星包含更多中间产品及星球专属建筑。此设置会归档大部分新内容。如希望游玩流程更轻松简洁，请关闭此项。

ske_easy_fluids=开启后，多数灶神星配方的气体消耗将显著降低。复杂模式下无效。

