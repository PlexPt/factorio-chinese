[technology-description]
dt-fuel=氘氚混合物，是多种等离子体反应的催化剂。
hot-lithium-production=热量能催化锂发生反应，使得氚的提取成为可能。
tritium-production=氚是等离子体反应过程的重要原料。
hot-heavy-water-production=加热重水和硫化氢即可提取得到氘。
deuterium-production=氘是等离子体反应过程的重要原料。
s1_cluster_processing=附近的岩石上检测出了痕量的钙结铁与钙结铜。岩石上似乎存在某种藻类，能将常见的金属沉积为类似晶体的形态。
s1_ammonia_chilled_plate=共同加热钢和铁，再迅速进行冷却，制得的合金即能承受极端的温度。
s1_brine=将水精制为卤水是生产氚气的重要步骤。我之前是不是在哪见过这种加工工艺？
s1_exotic_algae=研究更多种奇异的藻类配方。
s1_iridium_plate=铱板能承受磁化处理产生的极端温度。
s1_nutrients_from_co2=二氧化碳似乎是最适宜灶神星微生物生长的温床。
s1_vestan_char=进一步加热碳，可将其加工为更易燃烧的材料。
s1_sandceramicmesh=千里之行，当始于足下。而且得是“小碎步”。
fusion-missile=等离子体虽强大但也极易扩散，磁性合金可用于容纳这种不稳定、易扩散的物质。制成的火箭弹伤害较高且杀伤半径大。
ske_fusion_thruster=我们的推进器可以进一步升级和改进。如今我们已能利用等离子体的力量推动太空平台，借助能量效率更高的能源，达到前所未有的速度，抵达前所未及的地方。
ske_fusion-thruster=我们的推进器可以进一步升级和改进。如今我们已能利用等离子体的力量推动太空平台，借助能量效率更高的能源，达到前所未有的速度，抵达前所未及的地方。
s2_transport-belt-capacity-vesta=灶神星传送带容量
s2_worker-robots-storage-vesta=灶神星作业机器人货物运量
transport-belt-capacity-vesta=灶神星传送带容量
worker-robots-storage-vesta=灶神星作业机器人货物运量

s1_dueterium=获取并利用灶神星大气中的各种元素，便能生产出更先进的聚变燃料。将各类化合物拆解重组，可将它们制成多种纯净的氢同位素。奇怪的是，氘和氚是生产铱的必需品。
s1_iridium=铱板的耐用性和耐热性足够强，能为藻类提供温暖的生长环境，不会让它们被高温杀死。
s1_algea_discovery=灶神星大气中的各种气体是许多微生物物种的家园。从这些气体中收集少量微生物，加以精心培养，它们即有潜力成为我们在这里获取铁、铜等资源的唯一途径。
s1_algea_extracting=灶神星的藻类高度进化且极为强大。向其供热并提供特定种类的气体，可令其改变自身组成，产出与句芒星细菌产物类似的金属化合物。这些化合物可经燃烧进一步精制，最终产出多种金属资源。
s1_gas_manipulation_science_pack=研究多种与气体有关的科技增强。
s2_fusion_enhancements=进一步推进我们在聚变能上的突破。

planet-discovery-vesta=探索大部由气体构成的巨行星——灶神星（Vesta）。它的气体场内似乎捕获有许多岩石质的构造。气体区域由多种简单的气体混合组成，如氢气、氮气、二氧化碳、氦气等。气体场内似乎还有痕量的杂质，种类繁多，可以通过过滤滤出。

s1_algea_filtering=滤水器能从水中轻松滤出我们培养的高浓度藻类水。然而，并非所有的过滤器都有效。只有经过专门设计，能在分离出藻类的同时保证自身结构不受损的才可使用。
s1_algea_filtering_2=滤水器可以清理净化，得到干净的滤水器，同时额外产出一些藻类。

s1_algea_oversaturation=给灶神星的藻类提供过量的资源，可让其富集营养素。所得产品能替代普通的营养素，而且不会变质！

s1_algea_culturing=灶神星大气中的各种气体是许多微生物物种的家园。从这些气体中收集少量微生物，加以精心培养，它们即有潜力成为我们在这里获取铁、铜等资源的唯一途径。

s1_algea_treatment=灶神星的藻类高度进化且极为强大。向其供热并提供特定种类的气体，可令其改变自身组成，产出与句芒星细菌产物类似的金属化合物。这些化合物可经燃烧进一步精制，最终产出多种金属资源。

s1_electrolysis=有些时候我们的问题不能靠热解决，而要靠电。向不同物质引入大量电能可改变它们的组成。部分藻类在受到电击时可能会有意想不到的反应。

s1_supermagnet=高强度的电流可以在环形基质中产生强大的磁场。这种场能激发多种资源并为其充能，致其活化。部分藻类对这种能量的反应可能会与预想不同。

s1_t2d2=获取并利用灶神星大气中的各种元素，便能生产出更先进的聚变燃料。将各类化合物拆解重组，可将它们制成多种纯净物，进一步推进我们在聚变能上的突破。

s2_fusion_robots=有了先进的能源，利用它们升级已有的物流方式和机器人便是理所当然。这些机器人由氘氚燃料聚变能源驱动，永远不需要充电，能够无休止地工作下去。

s2_plasma_pipes=聚变反应产生的等离子体无法运输、无法控制，但现在可以了。在加固的管道框架外部绕上铜线圈，再在内部衬上强韧耐热的钷素合金，就能随心运输等离子体。不过，受等离子体本身性质的限制，这种管道无法埋入地下。

s2_plateworkings=氢和氧是适用于冶炼矿石的优良催化剂。在燃烧过程中引入两者之一，即能增加铜、铁等基础金属的产出量。氢催化的产出量更大但加工速度稍慢，氧催化的速度则奇快无比。

s2_intermediate_productivity=增加最常见物品的生产能力。

s1_algea_rare_metals=稀有金属是制造处理器及其他物品的必需品，但灶神星上无法获取稀有金属。我们可以尝试培养一种藻类，让它们钙结出这种金属的沉积物。

ske_heating_conductor=有些时候，热是唯一能改变分子结构的催化剂。加热导体能接受多种流体和物品，将它们暴露在极高温环境下，以产出全新的材料。

hydrogen-sulfide=硫化氢是生产氘气的必需品。如果能在灶神星之外制造硫化氢，那么在其他星球直接产出聚变机器人也就不再是异想天开了。

ske_carbon_dioxide_offworld=简单将碳暴露在极端温度下，再引入水等氧源，就应当能产出二氧化碳。
carbon-dioxide=简单将碳暴露在极端温度下，再引入水等氧源，就应当能产出二氧化碳。

ske_working_with_gases=灶神星上的大部分资源都是气体。可以使用抽取泵从云海里抽出它们。
ske_gas_giant_platform=在云海上扩张工厂并不像想象中的那样困难。灶神星的云海足够浓密，即便是最沉重的平台也能浮在其上，不必担心无处扩地。

