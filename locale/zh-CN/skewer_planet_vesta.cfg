[mod-setting-description]
ske_realistic_gases=用更广泛接受的外观取代多彩气体。
ske_vesta_gases=关闭时，灶神星将采用全局气体设定。如本模组与其他模组在流体兼容性上存在冲突，可开启此选项，灶神星相关气体将独立处理，可能出现重复流体。
ske_disable_metal_and_stars_bots=默认关闭。如同时游玩“金属与群星”并不希望获得反物质机器人，请开启本项。
ske_vesta_original_generation=启用时，灶神星表现为原生地貌，有大型岩石平台点缀气态巨行星表面，适合休闲体验。关闭后，灶神星为极度真实的气体巨星，仅有气巨基础平台，无其余陆块，适合自虐挑战。
ske_vesta_legacy_recipes=恢复原1.0配方与科技链。灶神星模式包含更多中间材料及星球专属建筑。新内容多被归档于此，非休闲模式。
ske_easy_fluids=开启后，多数灶神星配方气体消耗将显著降低。复杂模式下无效。

