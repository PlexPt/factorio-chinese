[space-location-description]
skewer_shattered_planet=破碎星球（Shattered Planet）：终点，已知世界的极限。一个高放射性环境，物理定律本身在此改变。资源稀缺且几乎不存在，只在各个表面上有极少量的本地星块。这里的压力过高，无法进行标准的星岩处理，而且当地的电磁环境也让机器人时刻面临危险。
planet-discovery-shattered=破碎星球（Shattered Planet）：终点，已知世界的极限。一个高放射性环境，物理定律本身在此改变。资源稀缺且几乎不存在，只在各个表面上有极少量的本地星块。这里的压力过高，无法进行标准的星岩处理，而且当地的电磁环境也让机器人时刻面临危险。
skewer_lost_beyond=破碎世界的前方，留给人们想象。我们正在从现实走向虚构。

