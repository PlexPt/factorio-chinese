[technology-description]
uranium_isotopes=回收铀似乎会产生少量铀-238和铀-235形式的同位素。
ske_rubia_tech=当暴露在破碎星球的离子大气中时，Craptonite 与同位素有奇特的相互作用。当钚-241同位素被送入使用 Craptonite 作为过滤器的同位素罩时，可以提取锫-248。然而，所有其他可能的同位素都会在转换中丢失。不过，只要你不介意损失宝贵的材料，这是一个弥补到锎的捷径。我们在开玩笑吗？我们像木工一样把它扔出天空，反正我们有无限量的这种东西！
alternate_methods_of_production=将材料从已知宇宙带到遥远的虚空并不容易。我们可以开发新的方法来重现我们在这里所缺乏的东西，离子风暴提供了必要的条件来创造我们通常无法在其他地方制造的东西。
chunk_slurry_creation=由于无法在行星表面进行破碎，我们必须想出另一种处理资源的方法。利用硫酸，我们可以分解小行星矿块并将它们混合以制造它们的化合物浆液。然后可以将这些化合物进一步加工成它们的各自产出。
ske_graphite=石墨可以使用本地资源在破碎星球上制造。
promethium_plate=钷板具有与铅相似的抗强能量性，并且可以承载和调节这些能量，与石墨相同。它是一种坚固的合金。
ske_high_density_structure=更强的抗拉连接将使我们能够制造更坚固的机器，能够处理更密集的任务。
ske_recipe_transformation=这个被巧妙地命名为 RTG，即配方转换机（Recipe Transformation Gin），可以利用同位素的强烈辐射，轰击各种化合物的原子核，将它们转化为我们想要用于特定任务的东西。


planet-discovery-skewer-shattered=终点，已知世界的极限。一个高放射性环境，物理定律在此弯曲。资源稀缺且几乎不存在，尽管在不同的表面上似乎有当地小行星碎片的痕迹。压力过高，无法进行标准的行星加工，电磁效应使得使用机器人很危险。
planet-discovery-shattered=终点，已知世界的极限。一个高放射性环境，物理定律在此弯曲。资源稀缺且几乎不存在，尽管在不同的表面上似乎有当地小行星碎片的痕迹。压力过高，无法进行标准的行星加工，电磁效应使得使用机器人很危险。

chunk_harvesting=破碎星球上的资源稀缺，但在散布的各个大陆内部，残留着各种小行星的碎片。然而，行星上的条件使得以常规方式加工这些碎片很困难。利用硫酸，可以将它们熔化成更可用的浆液。

isotope_working=原始珍珠的显化需要利用各种放射性同位素。这些过程的第一步需要将铀增殖到下一个过程，即钚。
s1_shattered_modules=三级模块通常无法在破碎星球上制造，并且从 Nauvis 的太阳系进口它们需要消耗大量的资源来运输它们通过危险的旅程。然而，这里的强大压力似乎允许分离出的同位素替代三级模块中一些原始的、更奇异的成分。

s1_uranium_enrichment=铀-235 在我们的过程中非常重要，但依靠离心分离的几率太耗时，而铀增殖技术提供的又不够。通过使用我们的一些其他同位素，我们可以进一步浓缩我们的铀产量！
s1_thorium_extraction=在钷矿石中发现了微量的钍同位素。用氢提取可以微妙地增加我们的铀供应。

s1_plutonium=同位素加工的进一步工作。
s2_curium=同位素加工的进一步工作。
s2_plasma_control=聚变反应产生的等离子体通常无法移动或操纵，直到现在。通过在加强的管道框架周围制作铜线圈，并在内部用强、耐热的钷合金衬里，我们可以自由地移动等离子体到我们希望的地方。然而，由于我们操纵的元素的性质，管道不能放置在地形下。

s3_californium=同位素加工的进一步工作。
s4_pearl_realizer=银河系最强力量的显化！

s2_noblegases=惰性气体可以从氧化物小行星矿块中的微量杂质中提取。它们对于制造将用于显化原始珍珠的反物质过程是必需的。
s2_nanometal=纳米金属在自然界中是一种极其罕见的金属，被认为能够处理控制宇宙宏观力量所需的极端力量。纳米金属对于容纳最危险的这些力量——反物质——是必需的。在钷矿石中发现了微量的纳米金属。
s3_trainfuels=处理铀产生的同位素可用于我们车辆的优质燃料。

noble_gas_productivity=增加惰性气体产量
water_productivity=冰融化时产出更多水

skewer-promethium-science-pack=钷素科学包（黑瓶）

s1_isotope_liquification=我们现在将能够熔化和储存常见同位素，或将它们重新组合！
s2_isotope_liquification=我们现在将能够熔化和储存不常见同位素，或将它们重新组合！
s3_isotope_liquification=我们现在将能够熔化和储存稀有同位素，或将它们重新组合！

