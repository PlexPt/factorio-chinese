[technology-description]
uranium_isotopes=回收铀似乎会产出少量的铀-238和铀-235同位素。
ske_rubia_tech=在破碎星球的离子气氛中，废岩似乎会与同位素产生奇异的反应。使用废岩作为筛网，向同位素处理罩送入钚-241，即有概率提取得到锫-248。不过，此过程会遗失其他所有可能的同位素。只要不介意损失珍贵材料，这确实是跳步产出锎的好方法。又何必自欺欺人呢？我们早就在像扔垃圾一样往太空扔它们，反正这东西我们有的是！
alternate_methods_of_production=将材料从我们已知的宇宙带到遥远的虚空并不容易。我们可用开发新方法，在这里重新造出我们缺的东西，离子风暴提供的条件足够实现别处实现不了的配方。
chunk_slurry_creation=由于星球表面无法进行破碎，我们只得开发出其他处理资源的方法。借助硫酸，我们可以拆散星块，并混合两者制成相应的浆液。这些浆液可用进一步处理成相应的产品。
ske_graphite=石墨可在破碎星球上使用本地资源制造。
promethium_plate=钷素板对高密度能量的抵抗能力与铅类似，而且能传递并调节能量，和石墨一样，是一种强大的合金。
ske_high_density_structure=更强大的抗拉连接能用于制造更强大的机器，处理更繁重的任务。
ske_recipe_transformation=RTG，即配方转换机（Recipe Transformation Gin），名字起得很好。它能利用同位素的强辐射轰击多种化合物的原子核，根据任务需要转化它们。


planet-discovery-skewer-shattered=破碎星球（Shattered Planet）：终点，已知世界的极限。一个高放射性环境，物理定律本身在此改变。资源稀缺且几乎不存在，只在各个表面上有极少量的本地星块。这里的压力过高，无法进行标准的星岩处理，而且当地的电磁环境也让机器人时刻面临危险。
planet-discovery-shattered=破碎星球（Shattered Planet）：终点，已知世界的极限。一个高放射性环境，物理定律本身在此改变。资源稀缺且几乎不存在，只在各个表面上有极少量的本地星块。这里的压力过高，无法进行标准的星岩处理，而且当地的电磁环境也让机器人时刻面临危险。

chunk_harvesting=破碎星球上的资源很少见。但在太空中散落的各个大岩体内部，残余着多种星岩的碎块。不过，星球的环境使得星块的常规处理很难达成。若借助硫酸，就能把它们溶化成更方便处理的浆液。

isotope_working=原始珍珠的显化需要使用多种放射性同位素。而其中的第一种需要让铀增殖一步，即钚。
s1_shattered_modules=通常来说，破碎星球上无法制造3级插件，而要是从新地星所在恒星系运送过来，穿过危险的太空，需要的资源太多。不过，这里的强大压力似乎能让分离得到的同位素替代3级插件需要的那些新奇、独特的原材料。

s1_uranium_enrichment=铀-235在我们的工厂中极为重要，但只靠概率用离心生产太过耗时，普通铀增殖技术提供的又不够。借助其他的同位素，我们便可以进一步提升铀增殖的产量！
s1_thorium_extraction=钷素矿中存在痕量的钍同位素。使用氢进行提取便可以稍稍增加我们的铀产量。

s1_plutonium=进一步推进同位素处理技术。
s2_curium=进一步推进同位素处理技术。
s2_plasma_control=聚变反应产生的等离子体无法运输、无法控制，但现在可以了。在加固的管道框架外部绕上铜线圈，再在内部衬上强韧耐热的钷素合金，就能随心运输等离子体。不过，受等离子体本身性质的限制，这种管道无法埋入地下。

s3_californium=进一步推进同位素处理技术。
s4_pearl_realizer=银河中最强大力量的显化！

s2_noblegases=氧化星块的痕量杂质可以提取出稀有气体。它们是显化原始珍珠所用反物质的必需原材料。
s2_nanometal=纳米金属是自然界中一种极其稀有的金属，被认为能承受极为强大的力，足够掌控宇宙的宏大力量。约束其中最危险的力量——反物质，离不开纳米金属。钷素矿中有痕量的纳米金属。
s3_trainfuels=处理铀得到的同位素能用于制造可供载具使用的高级燃料。

noble_gas_productivity=增加稀有气体的产量
water_productivity=融化冰会产出更多水

skewer-promethium-science-pack=钷素科技包（黑瓶）

s1_isotope_liquification=我们现在能熔化和储存常见的同位素，还能把它们重新组合起来！
s2_isotope_liquification=我们现在能熔化和储存少见的同位素，还能把它们重新组合起来！
s3_isotope_liquification=我们现在能熔化和储存稀有的同位素，还能把它们重新组合起来！

