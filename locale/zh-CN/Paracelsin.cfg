[tips-and-tricks-item-name]
paracelsin-briefing=北冥星导览
fulgoran-log=雷神星日志

[tips-and-tricks-item-description]
paracelsin-briefing=[planet=paracelsin]是一个像[planet=aquilo]一样的冰冻荒原，但与氨的世界不同，它有一个坚实的表面。在地表之下，这个星球有一个巨大的[fluid=nitrogen]海洋，这些液体流到地表形成[tile=nitrogen-lake]。这个星球富含[item=sphalerite]和[item=tetrahedrite]（[item=zinc]的化合物 ）以及[item=vaterite]。在地表还可以看到[entity=water-cryovolcano]散布着。
fulgoran-log=在[entity=crashed-fulgoran-pod]内部，除了蓝图之外，你发现了一条信息。多亏了对雷神星的研究，你能够读懂这些语句：“向所有可能发现此信息的生命体致敬。我们是雷神星人，我们将这些太空舱送往这片冰封的荒地来寻找石油。我们对增长的追求给我们的星球环境带来了一些轻微的后果——我们并不在乎——但也耗尽了我们大部分心爱的石油供应，并为自己收集了其加工副产品的一些备份。如果你知道有石油的地方，请联系我们最近的行星前哨站。如果你的星球目前不具备太空旅行能力，请将此信息发送给具备能力的文明。如果到那时我们已经死了......好吧，我怀疑我们可能会失败。” 你和雷神星人本可以成为很好的朋友。