zinc-purification=在充满[fluid=steam]的环境中向[fluid=dirty-zinc-solution]插入带电的[item=copper-cable]，通过电力进行提纯。
sphalerite-melting=使用[fluid=steam]和[fluid=nitric-acid]辅助熔化[item=sphalerite]，将其低效率地加工为[fluid=molten-iron]，不留下任何副产品。
tetrahedrite-melting=使用[fluid=steam]和[fluid=nitric-acid]辅助熔化[item=tetrahedrite]，将其低效率地加工为[fluid=molten-copper]，不留下任何副产品。
solar-matrix=更高级、更高效的太阳能板。太阳能电池经过[fluid=nitrogen]的处理。由于缺乏强烈的阳光，它依然无法在[planet=paracelsin]上使用。
accumulator-v2=更高级的蓄电器。电池中使用的是[fluid=nitric-acid]。
