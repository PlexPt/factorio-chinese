[technology-description]
planet-discovery-paracelsin=一片冰火山活动极为频繁的冰封荒原。[fluid=nitrogen]自地下海洋流出，在地表形成许多湖泊。星球的地表上还散布着[entity=water-cryovolcano]以及[item=tetrahedrite]和[item=sphalerite]的矿脉，它们对[item=zinc]的提取至关重要。[item=vaterite]也以小矿脉的形式存在。在这个星球上建造的所有东西都必须保持温暖，否则就会冻结；锌提取过程中产生的所有无用副产品都必须进行处理。
cryovolcanic-power=冰封的[entity=crashed-fulgoran-pod]中有几份古老的蓝图，其上记录着使用[entity=water-cryovolcano]所产水发电的特殊发电机，以及速度极快但效率低下的[entity=burner-pumpjack]。它们可以用来启动这颗星球的供电系统。
nitric-acid-handling=通过分析[entity=big-metallic-rock]上自发发生的化学反应，我们便可尝试复现以生产[fluid=nitric-acid]。
sphalerite-processing=将[item=sphalerite]加工为[fluid=zinc-concentrate]、[item=iron-ore]、[item=sulfur]。
tetrahedrite-processing=将[item=tetrahedrite]加工为[fluid=zinc-concentrate]、[item=copper-ore]、[item=sulfur]。
zinc-extraction=通过各种工艺将[fluid=dirty-zinc-solution]加工为[item=zinc]。
electrochemical-plant=利用电化学进行各种化学处理的化工厂。
mechanical-plant=利用先进机械处理制造各种物品的工厂。
galvanization-science-pack=允许研究更高级的电镀应用技术。
vaterite-processing-productivity=增加[recipe=vaterite-processing]的产出量。
zinc-piping=坚固的隔热管道，由[item=zinc-plate]制成。不会在[planet=paracelsin]、[planet=aquilo]等低温表面冻结，地下管道的长度也较普通管道更长。
axe-mining-speed=通过电镀处理与修复斧镐，可以加快手动采矿的速度。
advanced-repair-device=相较于标准的[item=repair-pack]，这种纳米机器人科技产物的修理速度更快，耐久度也更高。
solar-matrix=即便[planet=paracelsin]上完全无法使用太阳能发电，也依然可以用北冥星科技研发新的太阳能设备。
accumulator-v2=更加强大的蓄电器，借助[item=supercapacitor]和[item=electric-coil]增加了能量储存容量。
elevated-pipe=坚固的支撑结构，可将管道离地放置在高处。
galvanized-steel=将[item=zinc]镀在[item=steel-plate]的表面，增强其强度和抗腐蚀能力。
vaterite-formation=由于星球上缺乏大型的[item=vaterite]矿床，我们必须研究出合成它的方法。
macerating=经过改良的破碎机，能将一切物品打成粉末。

