[entity-description]
crashed-fulgoran-pod=古代太空货舱的冰封残骸。从化学组成特征和建造风格出发，它应当是由雷神星人制造的。
electrochemical-plant=能够进行电化学处理的机器。
mechanical-plant=能够进行先进机械处理的机器。
water-cryovolcano=会喷出水的冰火山，喷发物来自于[planet=paracelsin]地下深处。
cryovolcanic-turbine=一种特殊的发电机，利用[entity=water-cryovolcano]喷出的液态水发电。
burner-pumpjack=速度快到违背直觉的抽油机，由可燃燃料驱动，效率极低。有助于在[planet=paracelsin]上启动基底。由于是燃料驱动，它不会冻结。
zinc-pipe=镀锌管道，不会在寒冷的表面上冻结。
zinc-pipe-to-ground=镀锌管道，不会在寒冷的表面上冻结。
zinc-storage-tank=镀锌管道，不会在寒冷的表面上冻结。
zinc-pump=镀锌管道，不会在寒冷的表面上冻结。
solar-matrix=更高级、更高效的太阳能板。太阳能电池经过[fluid=nitrogen]的处理。由于缺乏强烈的阳光，它依然无法在[planet=paracelsin]上使用。
accumulator-v2=更高级的蓄电器。电池中使用的是[fluid=nitric-acid]。
elevated-pipe=坚固的支撑结构，可将管道离地放置在高处。
macerator=东西进去，什么都出不来。

