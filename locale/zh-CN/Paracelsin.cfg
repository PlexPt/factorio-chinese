vaterite-formation=通过在[entity=electrochemical-plant]中复现[planet=paracelsin]的原始特性，我们可以使用[item=vaterite]作为催化剂，以[fluid=nitrogen]处理[item=stone]，从而有概率产生更多球霰石。

