[mod-name]
Paracelsin=○🌐北冥星

[mod-description]
Paracelsin=探索北冥星冰封的山脉，在那里开采锌是一场与堵塞和结冰赛跑的竞赛。

[mod-setting-name]
paracelsin-zinc-implementation=将锌加入到玄冥星的一些配方中。
paracelsin-galvanized-promethium=将电镀科技包（棕瓶）加入到钷研究中。

[mod-setting-description]
paracelsin-zinc-implementation=将锌焊料加入到量子处理器中，并将电线圈加入到轨道炮、轨道炮塔、聚变反应堆、聚变发电机和便携式聚变反应堆中。该模组推荐启用此设置进行游戏。

[space-location-name]
paracelsin=北冥星

[space-location-description]
paracelsin=一个高度冰火山活动频繁的冰原星球。[fluid=nitrogen]形成的湖泊覆盖着地表，这些湖泊的水来自地下海洋。[entity=water-cryovolcano]散布在地表，与[item=tetrahedrite]和[item=sphalerite]矿脉相伴，而这些矿脉对[item=zinc]的提取至关重要。[item=vaterite]也以小矿脉的形式存在。在这个星球上建造的任何东西都必须持续保持温暖，否则就会结冰，而且锌提取过程中产生的所有无用副产品都必须进行处理。

