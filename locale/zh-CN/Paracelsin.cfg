[tips-and-tricks-item-name]
paracelsin-briefing=北冥星导览
fulgoran-log=雷神星日志

[tips-and-tricks-item-description]
paracelsin-briefing=[planet=paracelsin]（Paracelsin），类似于[planet=aquilo]的一片冰封荒原，但和遍布液氨的世界不同，它拥有固态的地表。这颗星球的地下有着巨大的[fluid=nitrogen]海洋，它们涌出地表形成[tile=nitrogen-lake]。北冥星富含[item=sphalerite]、[item=tetrahedrite]——[item=zinc]的化合物，以及[item=vaterite]。地表还散布着许多[entity=water-cryovolcano]。
fulgoran-log=在[entity=crashed-fulgoran-pod]内部，除去那几份蓝图之外，你还发现了一条信息。多亏了在雷神星上完成的研究，你成功将其翻译了出来：“向所有可能发现此信息的生命体致以问候。我们是雷神星人，我们向这片冰封荒原发射这些太空舱，是为了寻找石油。我们对发展的追求给我们所属星球的环境造成了些许微不足道的影响——不是说我们在乎这个——也几乎耗尽了我们心爱的石油资源，同时堆积了数量相当可观的石油副产品。如果你知道哪里有石油，请联系我们最近的星球前哨站。如果你的星球当前还无法进行星际航行，请将这条信息转达给有此能力的文明。而若是我们已经灭亡……好吧，我并不认为我们会失败。”你和雷神星人本可以成为很好的朋友。