mechanical-plant=能够进行先进机械处理的机器。
cryovolcanic-turbine=一种特殊的发电机，利用[entity=water-cryovolcano]喷出的液态水发电。
burner-pumpjack=一种反常地快速的抽油机，由可燃燃料驱动，效率极低。有助于在[planet=paracelsin]上启动基地。由于是燃油驱动，它不会结冰。
zinc-pipe=镀锌管道。不会在寒冷的表面上结冰。
zinc-pipe-to-ground=镀锌管道。不会在寒冷的表面上结冰。
zinc-storage-tank=镀锌储液罐。不会在寒冷的表面上结冰。
zinc-pump=镀锌管道泵。不会在寒冷的表面上结冰。
solar-matrix=一种更高级、更高效的太阳能板。太阳能电池板用[fluid=nitrogen]处理过。由于缺乏强烈的阳光，它在[planet=paracelsin]上仍然没有用。
accumulator-v2=一种更高级的蓄电器。电池使用[fluid=nitric-acid]。
elevated-pipe=坚固的支撑结构，允许管道放置在地面高处。

