[mod-name]
Paracelsin=○🌐北冥星

[mod-description]
Paracelsin=○🌐探索北冥星冰封的山脉，在那里开采锌是一场与堵塞和结冰赛跑的竞赛。

[mod-setting-name]
paracelsin-zinc-implementation=将北冥星的资源加入到玄冥星后续科技的需求之中。
paracelsin-galvanized-promethium=将电镀科技包（棕瓶）加入钷素研究。

[mod-setting-description]
paracelsin-zinc-implementation=将电镀科技包（棕瓶）加入部分玄冥星科技，将锌焊料加入量子处理器的配方，将电线圈加入磁轨炮、磁轨炮塔、聚变反应堆、聚变发电机、聚变反应堆模块的配方。本模组推荐启用此设置游玩。

[space-location-name]
paracelsin=北冥星

[space-location-description]
paracelsin=一片冰火山活动极为频繁的冰封荒原。[fluid=nitrogen]自地下海洋流出，在地表形成许多湖泊。星球的地表上还散布着[entity=water-cryovolcano]以及[item=tetrahedrite]和[item=sphalerite]的矿脉，它们对[item=zinc]的提取至关重要。[item=vaterite]也以小矿脉的形式存在。在这个星球上建造的所有东西都必须保持温暖，否则就会结冰；锌提取过程中产生的所有无用副产品都必须进行处理。

