[tips-and-tricks-item-description]
moshine-briefing=[planet=moshine]（Moshine），一颗炎热的火山星球，富含[item=sand]（可解锁[item=silicon]和[item=glass]）和[item=neodymium]（是制造[item=magnet]的好材料）。这里太热了，很难建造[entity=accumulator]，但好在到处都能找到高温的[entity=steam-geyser]。建议至少携带一台[entity=foundry]以处理熔融铁池中抽出的[fluid=molten-iron]。可用煤炭液化制造[fluid=crude-oil]。