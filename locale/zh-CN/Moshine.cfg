[technology-description]
planet-discovery-moshine=灼原星（Moshine）：一颗阳光普照的星球，富含钕和硅，太阳能丰沛。一些神秘的坠毁探测器中蕴藏着丰富的知识，我们可以利用这些知识来拓展人工智能的边界。
moshine-concrete-from-molten-iron-and-sand=用熔融铁和沙子制作混凝土。
moshine-petroleum-from-sand-sulfur-steam-carbon=用沙子、硫磺、煤炭制造石油气。
moshine-tech-silicon=可将沙子变成硅。
moshine-tech-glass=冶炼沙子可产出玻璃。
moshine-tech-silicon-cell=硅电池是计算机的重要组成部分。
moshine-tech-silicon-carbide=碳化硅可用作强大的绝缘体。
moshine-tech-magnet=将钕和铁加工成强力磁铁。钕是非常稀有的金属，但通常找到的都是大储量矿脉。
moshine-tech-datacell-empty=允许进行数据处理，并允许将数据存储于数据单元。
moshine-tech-data-processor-building=数据处理器能转换数据并处理与数据有关的任务。
moshine-tech-neural_computer=神经计算机通过处理大量数据来探索未知。
moshine-tech-data-extractor=允许你从灼原星上坠毁的探测器里检索提取数据。
moshine-tech-3d-data-storage=全息核心是容纳和后续训练复杂AI模型的最优方式。
moshine-tech-data-processor=允许你制造复杂的人工智能，但务必小心：AI的最初形态相当易爆。
moshine-tech-ai-trainer=AI模型可以通过自我学习来进行优化，进而达到前所未有的研究水平。
moshine-tech-ai-tier=对效能呈指数级提升的AI核心进行训练。
moshine-tech-processing-grid=处理极其复杂的计算操作。
tech-space-trains=载货量更大，速度更快的磁悬浮机车。
minimalist-rails=更为耐用的轨道，能够传输电力，使用灼原星的矿物制成。
minimalist-elevated-rails=钕轨的高架版本。

