[mod-name]
outer-worlds=系缘外星 [Outer Worlds]

[mod-description]
outer-worlds=为不属于星系外缘（Outer Rim）的外侧星球准备的兼容层。

[mod-setting-name]
outer-worlds-vesta-cubium-patch=灶神星-立方星补丁
outer-worlds-vesta-patches=灶神星兼容
outer-worlds-vesta-cubium-cannon-links=灶神星-立方星投物炮

[mod-setting-description]
outer-worlds-vesta-cubium-patch=将立方星改为灶神星的卫星。
outer-worlds-vesta-patches=若安装有灶神星，则将其移出小行星带，通常会移至星图上星系外缘有关星球下方的位置。
outer-worlds-vesta-cubium-cannon-links=立方星将只能从灶神星通过星际投物炮抵达。此设置会稍稍增加从立方星上运出资源的难度，主要是为平衡性考虑。